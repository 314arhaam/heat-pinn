name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "assets/**"

  pull_request:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "assets/**"

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build CLI
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Build wheel
        run: |
          uv build
          ls -lah dist

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 1

  test:
    name: Test on Python ${{ matrix.python-version }}
    needs: build
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: wheel
          path: dist

      - name: Inspect artifact
        run: ls -lah dist

      - name: Verify CLI entrypoints from wheel
        run: |
          uv tool run --from dist/*.whl heat build --help
          uv tool run --from dist/*.whl heat train --help
          uv tool run --from dist/*.whl heat infer --help
