name: Build Heat-PINN

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      
      - name: Checkout
        uses: actions/checkout@v4
  
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.12'
  
      - name: uv sync
        shell: bash
        run: uv sync
      
      - name: uv build
        shell: bash
        run: uv build && ls -l
      
      - name: uv tool
        shell: bash
        run: |
          uv tool install .
      
      - name: check model builder
        shell: bash
        run: |
          heat build --help

      - name: check model trainer
        shell: bash
        run: |
          heat train --help
  
      - name: check model inference
        shell: bash
        run: |
          heat infer --help